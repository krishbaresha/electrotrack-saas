name: Desktop Release

# Builds signed Windows + macOS installers whenever a `desktop-v*` tag is
# pushed (e.g. `desktop-v1.0.0`), and publishes them as a draft GitHub Release
# for review before making it public.

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: ./techbill-pos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: techbill-pos/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: techbill-pos/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set these two repo secrets once you've generated a signing key
          # (`npm run tauri signer generate -w ~/.tauri/techbill.key`) — until
          # then the build still runs, just unsigned (Windows SmartScreen will
          # warn "Unknown Publisher" and macOS builds won't be notarized).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: techbill-pos
          tagName: ${{ github.ref_name }}
          releaseName: "TechBill Desktop ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
